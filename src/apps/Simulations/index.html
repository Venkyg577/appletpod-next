<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sprite Sequence Player (Folder-based)</title>
    <link rel="stylesheet" href="styles/styles.css" />
    <!-- Inline manifest to avoid file:// CORS and allow easy overrides -->
 
  </head>
  <body>
    <div class="applet-container">
      <div class="layout">
        <!-- Script text is rendered by JS from appData -->
        <div
          class="script"
          id="script"
          aria-label="Circle description and controls"
        ></div>

        <!-- Stage now driven by Lottie animation -->
        <div id="viewer" aria-label="Animation viewer">
          <div id="lottie"  aria-hidden="true"></div>
          <div id="loading" class="loading" hidden>Loading…</div>
        </div>
      </div>
      <div class="navigation-container">
        <p id="instruction"></p>
      </div>
    </div>

    <!-- Order matters: Lottie first, then animation data, then scenes/text data, then app -->
    <script src="scripts/lottie.min.js"></script>
    <script src="scripts/animData.js"></script>
    <script src="scripts/audio.js"></script>
    <script src="scripts/data.js"></script>
    <script src="scripts/app.js"></script>
  </body>
</html>
