name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 */6 * * *'  # every 6 hours
  workflow_dispatch:         # allow manual trigger to test

jobs:
  ping-db:
    runs-on: ubuntu-latest
    steps:
      - name: Query free_applet_submissions
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}/rest/v1/free_applet_submissions?select=id&limit=1" \
            -H "apikey: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}")
          echo "Response status: $STATUS"
          if [ "$STATUS" -ne 200 ]; then
            echo "Unexpected status $STATUS — check secrets and table permissions"
            exit 1
          fi
